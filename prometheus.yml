global:
  scrape_interval: 15s

scrape_configs:
  - job_name: fastapi
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics

  - job_name: ingestion-worker
    static_configs:
      - targets: ["worker:9100"]

  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq-exporter:9419"]
